name: Auto-update pinned dependencies

on:
  workflow_dispatch:
  schedule:
    # Daily 04:00 Asia/Shanghai.
    - cron: "0 20 * * *"

permissions:
  contents: write
  pull-requests: write
  actions: write
  issues: write

concurrency:
  group: auto-update-pinned-deps
  cancel-in-progress: false

env:
  OPENWRT_REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  OPENWRT_BRANCH: main-nss
  INIT_SCRIPT_REPO_URL: https://github.com/immortalwrt/build-scripts.git
  INIT_SCRIPT_RAW_URL: https://raw.githubusercontent.com/immortalwrt/build-scripts
  FEED_NSS_PACKAGES_REPO_URL: https://github.com/qosmio/nss-packages.git
  FEED_SQM_SCRIPTS_NSS_REPO_URL: https://github.com/qosmio/sqm-scripts-nss.git
  FEED_PACKAGES_REPO_URL: https://github.com/immortalwrt/packages.git
  FEED_LUCI_REPO_URL: https://github.com/immortalwrt/luci.git
  FEED_ROUTING_REPO_URL: https://github.com/openwrt/routing.git
  FEED_TELEPHONY_REPO_URL: https://github.com/openwrt/telephony.git
  FEED_VIDEO_REPO_URL: https://github.com/openwrt/video.git
  AURORA_REPO_URL: https://github.com/eamonxg/luci-theme-aurora.git
  WOLULTRA_REPO_URL: https://github.com/VIKINGYFY/packages.git
  SING_BOX_REPO_URL: https://github.com/SagerNet/sing-box.git
  PINNED_DEPS_FILE: deps/pinned-deps.env
  UPDATE_BRANCH: codex/auto-update-pinned-deps
  PR_LABELS: dependencies,auto-update,pinned-deps
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    name: Update pinned dependency revisions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Ensure dependency labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          ensure_label() {
            name="$1"
            color="$2"
            description="$3"
            gh label create "$name" --color "$color" --description "$description" --force
          }

          ensure_label "dependencies" "0366d6" "Dependency update"
          ensure_label "auto-update" "ededed" "Automated update"
          ensure_label "pinned-deps" "fbca04" "Pinned upstream dependency update"
          ensure_label "github-actions" "5319e7" "GitHub Actions dependency update"

      - name: Resolve latest upstream revisions
        id: deps
        run: |
          set -euo pipefail

          resolve_head() {
            git ls-remote "$1" HEAD | awk 'NR == 1 { print $1 }'
          }

          openwrt_commit="$(git ls-remote "$OPENWRT_REPO_URL" "refs/heads/${OPENWRT_BRANCH}" | awk 'NR == 1 { print $1 }')"
          init_script_commit="$(resolve_head "$INIT_SCRIPT_REPO_URL")"
          feed_nss_packages_commit="$(resolve_head "$FEED_NSS_PACKAGES_REPO_URL")"
          feed_sqm_scripts_nss_commit="$(resolve_head "$FEED_SQM_SCRIPTS_NSS_REPO_URL")"
          feed_packages_commit="$(resolve_head "$FEED_PACKAGES_REPO_URL")"
          feed_luci_commit="$(resolve_head "$FEED_LUCI_REPO_URL")"
          feed_routing_commit="$(resolve_head "$FEED_ROUTING_REPO_URL")"
          feed_telephony_commit="$(resolve_head "$FEED_TELEPHONY_REPO_URL")"
          feed_video_commit="$(resolve_head "$FEED_VIDEO_REPO_URL")"
          wolultra_commit="$(resolve_head "$WOLULTRA_REPO_URL")"
          aurora_tag="$(git ls-remote --tags --refs "$AURORA_REPO_URL" \
            | awk '{print $2}' \
            | sed 's#refs/tags/##' \
            | grep -E '^v[0-9]+(\.[0-9]+)+$' \
            | sort -V \
            | tail -n1)"
          if [ -z "$aurora_tag" ]; then
            echo "Failed to resolve latest stable Aurora release tag" >&2
            exit 1
          fi
          aurora_commit="$(
            git ls-remote --tags "$AURORA_REPO_URL" \
              | awk -v tag="refs/tags/${aurora_tag}" '
                  $2 == tag "^{}" { print $1; found = 1; exit }
                  $2 == tag { commit = $1 }
                  END { if (!found && commit) print commit }
                '
          )"
          if [ -z "$aurora_commit" ]; then
            echo "Failed to resolve Aurora commit for tag ${aurora_tag}" >&2
            exit 1
          fi
          sing_box_tag="$(
            git ls-remote --tags --refs "$SING_BOX_REPO_URL" \
              | awk '{print $2}' \
              | sed 's#refs/tags/##' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n1
          )"
          sing_box_version="${sing_box_tag#v}"
          if [ -z "$sing_box_tag" ] || [ "$sing_box_tag" = "null" ] || [ -z "$sing_box_version" ]; then
            echo "Failed to resolve latest stable sing-box release" >&2
            exit 1
          fi

          for value in \
            "$openwrt_commit" "$init_script_commit" \
            "$feed_nss_packages_commit" "$feed_sqm_scripts_nss_commit" \
            "$feed_packages_commit" "$feed_luci_commit" "$feed_routing_commit" \
            "$feed_telephony_commit" "$feed_video_commit" \
            "$aurora_commit" "$wolultra_commit"; do
            if ! printf '%s\n' "$value" | grep -Eq '^[0-9a-f]{40}$'; then
              echo "Invalid commit hash resolved: ${value}" >&2
              exit 1
            fi
          done

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          curl -fsSL \
            "${INIT_SCRIPT_RAW_URL}/${init_script_commit}/init_build_environment.sh" \
            -o "$tmpdir/init_build_environment.sh"
          init_script_sha256="$(sha256sum "$tmpdir/init_build_environment.sh" | awk '{print $1}')"

          git init -q "$tmpdir/wolultra"
          git -C "$tmpdir/wolultra" remote add origin "$WOLULTRA_REPO_URL"
          git -C "$tmpdir/wolultra" fetch --depth=1 --filter=blob:none origin "$wolultra_commit"
          wolultra_tree="$(git -C "$tmpdir/wolultra" rev-parse FETCH_HEAD:luci-app-wolultra)"
          if ! printf '%s\n' "$wolultra_tree" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Invalid WOL Ultra package tree resolved: ${wolultra_tree}" >&2
            exit 1
          fi

          sing_box_tarball="$(mktemp -d)"
          trap 'rm -rf "$tmpdir" "$sing_box_tarball"' EXIT
          curl -fsSL "https://codeload.github.com/SagerNet/sing-box/tar.gz/${sing_box_tag}" -o "$sing_box_tarball/sing-box.tar.gz"
          sing_box_hash="$(sha256sum "$sing_box_tarball/sing-box.tar.gz" | awk '{print $1}')"

          {
            echo "openwrt_commit=${openwrt_commit}"
            echo "init_script_commit=${init_script_commit}"
            echo "init_script_sha256=${init_script_sha256}"
            echo "feed_nss_packages_commit=${feed_nss_packages_commit}"
            echo "feed_sqm_scripts_nss_commit=${feed_sqm_scripts_nss_commit}"
            echo "feed_packages_commit=${feed_packages_commit}"
            echo "feed_luci_commit=${feed_luci_commit}"
            echo "feed_routing_commit=${feed_routing_commit}"
            echo "feed_telephony_commit=${feed_telephony_commit}"
            echo "feed_video_commit=${feed_video_commit}"
            echo "aurora_tag=${aurora_tag}"
            echo "aurora_commit=${aurora_commit}"
            echo "wolultra_commit=${wolultra_commit}"
            echo "wolultra_tree=${wolultra_tree}"
            echo "sing_box_version=${sing_box_version}"
            echo "sing_box_hash=${sing_box_hash}"
          } >> "$GITHUB_OUTPUT"

      - name: Update pinned dependency file
        id: update_file
        env:
          OPENWRT_COMMIT: ${{ steps.deps.outputs.openwrt_commit }}
          INIT_SCRIPT_COMMIT: ${{ steps.deps.outputs.init_script_commit }}
          INIT_SCRIPT_SHA256: ${{ steps.deps.outputs.init_script_sha256 }}
          FEED_NSS_PACKAGES_COMMIT: ${{ steps.deps.outputs.feed_nss_packages_commit }}
          FEED_SQM_SCRIPTS_NSS_COMMIT: ${{ steps.deps.outputs.feed_sqm_scripts_nss_commit }}
          FEED_PACKAGES_COMMIT: ${{ steps.deps.outputs.feed_packages_commit }}
          FEED_LUCI_COMMIT: ${{ steps.deps.outputs.feed_luci_commit }}
          FEED_ROUTING_COMMIT: ${{ steps.deps.outputs.feed_routing_commit }}
          FEED_TELEPHONY_COMMIT: ${{ steps.deps.outputs.feed_telephony_commit }}
          FEED_VIDEO_COMMIT: ${{ steps.deps.outputs.feed_video_commit }}
          AURORA_TAG: ${{ steps.deps.outputs.aurora_tag }}
          AURORA_COMMIT: ${{ steps.deps.outputs.aurora_commit }}
          WOLULTRA_COMMIT: ${{ steps.deps.outputs.wolultra_commit }}
          WOLULTRA_TREE: ${{ steps.deps.outputs.wolultra_tree }}
          SING_BOX_VERSION: ${{ steps.deps.outputs.sing_box_version }}
          SING_BOX_HASH: ${{ steps.deps.outputs.sing_box_hash }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$PINNED_DEPS_FILE")"
          cat > "$PINNED_DEPS_FILE" <<EOF
          # Automatically maintained by .github/workflows/auto-update-pinned-deps.yml.
          # OPENWRT_COMMIT follows ${OPENWRT_REPO_URL} ${OPENWRT_BRANCH}.
          # AURORA_TAG follows the latest stable tag from ${AURORA_REPO_URL}.
          # WOLULTRA_COMMIT follows ${WOLULTRA_REPO_URL} HEAD; upstream has no release containing this package.
          OPENWRT_COMMIT=${OPENWRT_COMMIT}
          INIT_SCRIPT_COMMIT=${INIT_SCRIPT_COMMIT}
          INIT_SCRIPT_SHA256=${INIT_SCRIPT_SHA256}
          FEED_NSS_PACKAGES_COMMIT=${FEED_NSS_PACKAGES_COMMIT}
          FEED_SQM_SCRIPTS_NSS_COMMIT=${FEED_SQM_SCRIPTS_NSS_COMMIT}
          FEED_PACKAGES_COMMIT=${FEED_PACKAGES_COMMIT}
          FEED_LUCI_COMMIT=${FEED_LUCI_COMMIT}
          FEED_ROUTING_COMMIT=${FEED_ROUTING_COMMIT}
          FEED_TELEPHONY_COMMIT=${FEED_TELEPHONY_COMMIT}
          FEED_VIDEO_COMMIT=${FEED_VIDEO_COMMIT}
          AURORA_TAG=${AURORA_TAG}
          AURORA_COMMIT=${AURORA_COMMIT}
          WOLULTRA_COMMIT=${WOLULTRA_COMMIT}
          WOLULTRA_TREE=${WOLULTRA_TREE}
          SING_BOX_VERSION=${SING_BOX_VERSION}
          SING_BOX_HASH=${SING_BOX_HASH}
          EOF
          sed -i 's/^          //' "$PINNED_DEPS_FILE"

          git diff --check
          if git diff --quiet -- "$PINNED_DEPS_FILE"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Pinned dependencies are already current."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff -- "$PINNED_DEPS_FILE"
          fi

      - name: Create or update pull request
        id: pr
        if: steps.update_file.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          OPENWRT_COMMIT: ${{ steps.deps.outputs.openwrt_commit }}
          INIT_SCRIPT_COMMIT: ${{ steps.deps.outputs.init_script_commit }}
          INIT_SCRIPT_SHA256: ${{ steps.deps.outputs.init_script_sha256 }}
          FEED_NSS_PACKAGES_COMMIT: ${{ steps.deps.outputs.feed_nss_packages_commit }}
          FEED_SQM_SCRIPTS_NSS_COMMIT: ${{ steps.deps.outputs.feed_sqm_scripts_nss_commit }}
          FEED_PACKAGES_COMMIT: ${{ steps.deps.outputs.feed_packages_commit }}
          FEED_LUCI_COMMIT: ${{ steps.deps.outputs.feed_luci_commit }}
          FEED_ROUTING_COMMIT: ${{ steps.deps.outputs.feed_routing_commit }}
          FEED_TELEPHONY_COMMIT: ${{ steps.deps.outputs.feed_telephony_commit }}
          FEED_VIDEO_COMMIT: ${{ steps.deps.outputs.feed_video_commit }}
          AURORA_TAG: ${{ steps.deps.outputs.aurora_tag }}
          AURORA_COMMIT: ${{ steps.deps.outputs.aurora_commit }}
          WOLULTRA_COMMIT: ${{ steps.deps.outputs.wolultra_commit }}
          WOLULTRA_TREE: ${{ steps.deps.outputs.wolultra_tree }}
          SING_BOX_VERSION: ${{ steps.deps.outputs.sing_box_version }}
          SING_BOX_HASH: ${{ steps.deps.outputs.sing_box_hash }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          remote_branch_exists=false
          if git ls-remote --exit-code --heads origin "$UPDATE_BRANCH" >/dev/null 2>&1; then
            remote_branch_exists=true
            git fetch origin "refs/heads/${UPDATE_BRANCH}:refs/remotes/origin/${UPDATE_BRANCH}"
          fi
          git checkout -B "$UPDATE_BRANCH"
          git add "$PINNED_DEPS_FILE"
          git commit -m "chore: update pinned upstream dependencies"
          if [ "$remote_branch_exists" = "true" ]; then
            remote_sha="$(git rev-parse "refs/remotes/origin/${UPDATE_BRANCH}")"
            git push --force-with-lease="refs/heads/${UPDATE_BRANCH}:${remote_sha}" origin "$UPDATE_BRANCH"
          else
            git push origin "$UPDATE_BRANCH"
          fi

          body_file="$(mktemp)"
          cat > "$body_file" <<EOF
          Automated pinned dependency update.

          Updated revisions:
          - OpenWrt/LiBwrt (${OPENWRT_BRANCH}): \`${OPENWRT_COMMIT}\`
          - Build environment script: \`${INIT_SCRIPT_COMMIT}\` (SHA256: \`${INIT_SCRIPT_SHA256}\`)
          - nss_packages feed: \`${FEED_NSS_PACKAGES_COMMIT}\`
          - sqm_scripts_nss feed: \`${FEED_SQM_SCRIPTS_NSS_COMMIT}\`
          - packages feed: \`${FEED_PACKAGES_COMMIT}\`
          - luci feed: \`${FEED_LUCI_COMMIT}\`
          - routing feed: \`${FEED_ROUTING_COMMIT}\`
          - telephony feed: \`${FEED_TELEPHONY_COMMIT}\`
          - video feed: \`${FEED_VIDEO_COMMIT}\`
          - Aurora theme (${AURORA_TAG}): \`${AURORA_COMMIT}\`
          - WOL Ultra: \`${WOLULTRA_COMMIT}\`
          - WOL Ultra package tree: \`${WOLULTRA_TREE}\`
          - HomeProxy: bundled by luci feed \`${FEED_LUCI_COMMIT}\`
          - sing-box: \`${SING_BOX_VERSION}\`
          - sing-box tarball SHA256: \`${SING_BOX_HASH}\`

          Validation firmware builds are triggered automatically with \`firmware_release=false\`.
          EOF
          sed -i 's/^          //' "$body_file"

          pr_number="$(gh pr list --base "$BASE_BRANCH" --head "$UPDATE_BRANCH" --state open --json number --jq '.[0].number // ""')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "chore: update pinned upstream dependencies" --body-file "$body_file"
            pr_url="$(gh pr view "$pr_number" --json url --jq '.url')"
          else
            pr_url="$(gh pr create \
              --base "$BASE_BRANCH" \
              --head "$UPDATE_BRANCH" \
              --title "chore: update pinned upstream dependencies" \
              --body-file "$body_file")"
          fi
          pr_number="$(gh pr view "$pr_url" --json number --jq '.number')"
          gh pr edit "$pr_number" --add-label "$PR_LABELS"

          echo "url=${pr_url}" >> "$GITHUB_OUTPUT"
          echo "Pull request: ${pr_url}"

      - name: Trigger validation builds
        if: steps.update_file.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run zn-m2-1g-proxy-gateway.yml --ref "$UPDATE_BRANCH" -f firmware_release=false
          gh workflow run zn-m2-256m-main-router.yml --ref "$UPDATE_BRANCH" -f firmware_release=false
          echo "Validation builds dispatched for ${UPDATE_BRANCH}."
