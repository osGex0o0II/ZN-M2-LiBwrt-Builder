# ============================================================
# 256M 变体 TCP 缓冲区覆盖
# 覆盖 files/etc/sysctl.d/10-bbr.conf 中的 4MB 设置
# 加载顺序：10-bbr.conf → 99-bbr-256m.conf（数字排序），后者覆盖前者
#
# 256M 设备可用内存 ~157MB，4MB/连接 在高并发时可能 OOM
# 512KB/连接 在千兆路由场景下仍然充足（BDP ≈ 1Gbps × 30ms = 3.75MB）
# 实际 NSS 硬件加速处理大部分流量，TCP 缓冲区主要影响控制面
# ============================================================
net.core.rmem_max=524288
net.core.wmem_max=524288
net.ipv4.tcp_rmem=4096 87380 524288
net.ipv4.tcp_wmem=4096 65536 524288
